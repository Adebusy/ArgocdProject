{{- if eq (.Values.appKind | toString) "CronJob" }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Values.image.repository }}-cronjob
  namespace: "{{ .Values.appNamespace }}-ns" 
spec:
  schedule: "{{ .Values.schedule }}"
  concurrencyPolicy: {{ default 1 .Values.concurrencyPolicy }}
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: {{ .Values.image.repository }}
            image: "{{ .Values.containerregistry.name }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
            ports:
            - containerPort: {{ .Values.targetPort }}
            resources:
              requests:
                cpu: {{ default "100m" (.Values.resources).requests.cpu }}
                memory: {{ default "100Mi" (.Values.resources).requests.memory }}
              limits:
                cpu: {{ default "100m" (.Values.resources).limits.cpu }}
                memory: {{ default "100Mi" (.Values.resources).limits.memory }}
            env:
            {{- range $key, $val := .Values.env }}
              - name: {{ $key }}
                value: {{ $val | quote }}
            {{- end }}
            envFrom:
            {{- if eq .Values.deployConfigMap true }}
            - configMapRef:
                name: {{ .Values.appName }}-cm
            {{- end }}
            {{- if not (quote .Values.secret.name | empty) }}
            - secretRef:
                name: {{ .Values.secret.name }}
            {{- end }}
            resources:
              requests:
                cpu: {{ (.Values.resources).requests.cpu | default "100m" | quote }}
                memory: {{ (.Values.resources).requests.memory | default "100Mi" | quote }}
              limits:
                cpu: {{ (.Values.resources).limits.cpu | default "100m" | quote }}
                memory: {{ (.Values.resources).limits.memory | default "100Mi" | quote }}
          hostNetwork: false
          restartPolicy: Never
      activeDeadlineSeconds: {{ default 60 .Values.activeDeadlineSeconds }}  #60
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2 
{{- end }}
