{{- if eq (.Values.appKind | toString) "job" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.image.repository }}-job
  namespace: "{{ .Values.appNamespace }}-ns" 
spec:
  parallelism: {{ default 1 .Values.replicas }}
  template:
    spec:
      containers:
      - name: {{ .Values.image.repository }}
        image: "{{ .Values.containerregistry.name }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        env:
        {{- range $key, $val := .Values.env }}
          - name: {{ $key }}
            value: {{ $val | quote }}
        {{- end }}
        {{ if (.Values.secret).name }}
        envFrom:
          - secretRef:
              name: {{ .Values.secret.name }}
        {{ end }}
        resources:
          requests:
            cpu: {{ default "100m" (.Values.resources).requests.cpu }}
            memory: {{ default "100Mi" (.Values.resources).requests.memory }}
          limits:
            cpu: {{ default "100m" (.Values.resources).limits.cpu }}
            memory: {{ default "100Mi" (.Values.resources).limits.memory }}
      restartPolicy: Never
  backoffLimit: 4
{{- end }}
