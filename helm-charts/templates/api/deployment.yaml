{{- if or (eq .Values.appKind "microservice") (eq .Values.appKind "web") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: {{ .Values.image.repository }}
  name: {{ .Values.image.repository }}-deployment
  namespace: {{ .Values.appNamespace }}-ns
spec:
  replicas: {{ default 1 .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.image.repository }}
  template:
    metadata:
      labels:
        app: {{ .Values.image.repository }}
    spec:
      volumes:
        {{- if eq .Values.mountVolume true }}
        - name: {{ .Values.image.repository }}-volume
          configMap:
            name: {{ .Values.image.repository }}-cm
            defaultMode: 420
        {{- end }}
        # {{- if eq .Values.enableSideCar true }}
        # - name: shared
        #   emptyDir: {}
        # {{- end }}

      containers:
        - image: "{{ .Values.containerregistry.name }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          name: {{ .Values.image.repository }}
          ports:
          {{- range $v := .Values.targetports }}
            - containerPort : {{ $v.value }}
          {{- end }}
          resources:
            requests:
              cpu: {{ default "100m" (.Values.resources).requests.cpu }}
              memory: {{ default "100Mi" (.Values.resources).requests.memory }}
            limits:
              cpu: {{ default "100m" (.Values.resources).limits.cpu }}
              memory: {{ default "100Mi" (.Values.resources).limits.memory }}
          # {{- if .Values.enablePostStartHook }}
          # lifecycle:
          #     postStart:
          #       exec:
          #           command: ["/bin/sh", "-c", "printenv | grep -E '^(BRANCH_NAME|TAG|COMMIT_ID|SERVICE_VERSION|DEPLOY_TIME|BUILD_TIME)=' > /tmp/shared/env.list"]
          # {{- end }}
    
          volumeMounts:
          {{- if eq .Values.mountVolume true }}  
           - name: {{ .Values.image.repository }}-volume
             mountPath: {{ .Values.image.repository }}
          {{- end }}
          # {{- if eq .Values.enableSideCar true }}   
          #  - name: shared
          #    mountPath: /tmp/shared
          # {{- end }}

          env:
          {{- range $key, $val := .Values.env }}
           - name: {{ $key }}
             value: {{ $val | quote }}
          {{- end }}
          {{- range $key, $val := .Values.EnvironmentVariableSecret }}
           - name: {{ $val }}
             valueFrom: 
               secretKeyRef:
                name: {{ $key }}
                key: {{ $val }}
          {{- end }}
          {{- if (.Values.args) }}
          args:          
            {{  range .Values.args }}
             - {{ . }}
            {{ end }}
          {{- end }}
          {{- if (.Values.secrets) }}
          envFrom:
           {{- if eq .Values.deployConfigMap true }}
            - configMapRef:
                name: {{ .Values.image.repository }}-cm
           {{- end }}
            - secretRef:
                name: {{ .Values.image.repository }}
          {{- end }}
          {{- if (.Values.livenessProbe) }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: {{ .Values.livenessProbe.port }}
            initialDelaySeconds: {{ default 30 .Values.livenessProbe.initialDelaySeconds }}  #30
            periodSeconds: {{ default 30 .Values.livenessProbe.periodSeconds }}  #30
            timeoutSeconds: {{ default 5 .Values.livenessProbe.timeoutSeconds }}  #5
          {{- end }}
          {{- if (.Values.readinessProbe) }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: {{ .Values.readinessProbe.port }}
              scheme: HTTP
            initialDelaySeconds: {{ default 30 .Values.readinessProbe.initialDelaySeconds }}  #30
            periodSeconds: {{ default 30 .Values.readinessProbe.periodSeconds }}  #30
            timeoutSeconds: {{ default 5 .Values.readinessProbe.timeoutSeconds }}  #5
          {{- end }}
      
      
      # {{- if .Values.enableSideCar }}
      #   - image: "acrintcusclient0shared.azurecr.io/app-registration-service:3195"
      #     name: "sidecar"
      #     command: ["/bin/sh", "-c"]
      #     args:
