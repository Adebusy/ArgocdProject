      #         python /app/register_service.py
      #         touch /tmp/shared/sidecar-complete
      #         echo "Sidecar completed its task"
      #         tail -f /dev/null
      #     {{- if eq .Values.enableSideCar true }}
      #     volumeMounts:
      #       - name: shared
      #         mountPath: /tmp/shared
      #     {{- end }}
      #     env:
      #       {{- range $key, $val := .Values.env }}
      #       - name: {{ $key }}
      #         value: {{ $val | quote }}
      #       {{- end }}
      #       - name: CLIENT_AUTH
      #         valueFrom:
      #           secretKeyRef:
      #             name: {{ .Values.image.repository }}-sidecar
      #             key: CLIENT_AUTH
