apiVersion: v1
kind: Service
metadata:
  labels:
    app: "{{ .Values.appName }}"
  name: "serv-{{ .Values.appName }}"
  namespace: "{{ .Values.appNamespace }}"
spec:
  ports:
  - port: {{ .Values.port }}
    protocol: TCP
    targetPort: {{ .Values.targetPort }}
  selector:
    app: "{{ .Values.appName }}"
  sessionAffinity: None
  type: ClusterIP
